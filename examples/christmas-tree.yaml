~/study/:
    linux: git+git://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git
    freebsd: git+https://github.com/freebsd/freebsd.git
    sphinx: hg+https://bitbucket.org/birkenfeld/sphinx
    docutils: svn+http://svn.code.sf.net/p/docutils/code/trunk
~/github_projects/:
    kaptan:
        url: git+https://github.com/emre/kaptan
        remotes:
            upstream: git+https://github.com/emre/kaptan
            marksteve: git+https://github.com/marksteve/kaptan.git
            tony: git+git@github.com:tony/kaptan.git
~:
    .vim:
        url: git+git@github.com:tony/vim-config.git
    .tmux:
        url: git+git@github.com:tony/tmux-config.git
~/pinned/:
    # Global lock — no automated command can modify this entry
    internal-fork:
        repo: git+git@github.com:myorg/internal-fork.git
        options:
            lock: true
            lock_reason: "pinned to company fork — update manually"
    # Per-operation lock — only import and fmt are blocked
    my-framework:
        repo: git+git@github.com:myorg/my-framework.git
        options:
            lock:
                import: true
                fmt: true
            lock_reason: "URL managed manually; formatting intentional"
    # Shorthand — equivalent to lock: {import: true}
    stable-dep:
        repo: git+https://github.com/upstream/stable-dep.git
        options:
            allow_overwrite: false
